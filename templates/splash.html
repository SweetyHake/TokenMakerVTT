<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Token Maker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    height: 100%;
    background: #1a1a1a;
    color: #d4d4d4;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
}
.splash {
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 24px;
    max-width: 380px;
}
.logo svg { width: 48px; height: 48px; stroke: #e8873a; }
.spinner {
    width: 32px; height: 32px;
    border: 3px solid #2f2f2f;
    border-top-color: #e8873a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status { font-size: 13px; color: #888; }
.status .accent { color: #e8873a; }
.bar {
    width: 240px; height: 3px;
    background: #2f2f2f;
    border-radius: 2px;
    overflow: hidden;
}
.bar-fill {
    height: 100%;
    width: 0%;
    background: #e8873a;
    border-radius: 2px;
    transition: width 0.3s;
}
.btn {
    padding: 6px 14px; border-radius: 4px;
    border: 1px solid #3a3a3a; background: #1e1e1e;
    color: #d4d4d4; cursor: pointer; font-size: 12px;
    transition: border-color 0.15s, background 0.15s;
}
.btn:hover { border-color: #e8873a; background: rgba(232,135,58,0.12); }
.btn-primary { background: #e8873a; color: #1a1a1a; border-color: #e8873a; }
.btn-primary:hover { background: #f09448; }
.actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>
<div class="splash" id="splash">
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/></svg>
    </div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Загрузка...</div>
    <div class="bar" id="bar"><div class="bar-fill" id="barFill"></div></div>
    <div class="actions" id="actions" style="display:none"></div>
</div>
<script>
var downloading = false;

function go() { window.location.href = '/'; }

function startDownload(url) {
    downloading = true;
    document.getElementById('bar').style.display = '';
    document.getElementById('barFill').style.width = '0%';
    document.getElementById('actions').style.display = 'none';
    document.getElementById('spinner').style.display = '';
    document.getElementById('status').innerHTML = 'Скачивание обновления... <span class="accent">0%</span>';
    fetch('/start_update_download', { method: 'POST' }).catch(function(){});
    pollDownload();
}

function pollDownload() {
    fetch('/update_status').then(function(r) { return r.json(); }).then(function(d) {
        if (d.download_error) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status').innerHTML =
                '<span style="color:#e05252">Ошибка: ' + d.download_error + '</span>';
            document.getElementById('actions').style.display = 'flex';
            document.getElementById('actions').innerHTML =
                '<button class="btn" onclick="go()">Закрыть</button>';
            return;
        }
        if (!d.download_done) {
            var p = d.download_progress || 0;
            document.getElementById('status').innerHTML =
                'Скачивание обновления... <span class="accent">' + p + '%</span>';
            document.getElementById('barFill').style.width = p + '%';
            setTimeout(pollDownload, 300);
            return;
        }
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').innerHTML =
            'Обновление <span class="accent">' + (d.update_tag || '') + '</span> скачано!<br>Перезапустить приложение?';
        document.getElementById('actions').style.display = 'flex';
        document.getElementById('actions').innerHTML =
            '<button class="btn btn-primary" onclick="applyRestart()">Перезапустить</button>' +
            '<button class="btn" onclick="go()">Позже</button>';
    }).catch(function() {
        setTimeout(pollDownload, 500);
    });
}

function applyRestart() {
    document.getElementById('status').innerHTML = 'Перезапуск...';
    document.getElementById('actions').style.display = 'none';
    document.getElementById('spinner').style.display = '';
    fetch('/apply_update', { method: 'POST' }).then(function() {
        setTimeout(function() { window.location.href = '/'; }, 2000);
    });
}

function pollUpdate() {
    fetch('/update_status').then(function(r) { return r.json(); }).then(function(d) {
        if (d.download_progress >= 0 && !d.download_done) {
            pollDownload();
            return;
        }
        if (d.update_available && d.update_url && !downloading) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status').innerHTML =
                'Доступна версия <b class="accent">' + (d.update_tag || '') + '</b> (текущая: ' + d.current_version + ')';
            document.getElementById('actions').style.display = 'flex';
            document.getElementById('actions').innerHTML =
                '<button class="btn btn-primary" onclick="startDownload()">Скачать</button>' +
                '<button class="btn" onclick="go()">Пропустить</button>';
            return;
        }
        pollFake();
    }).catch(function() {
        setTimeout(pollUpdate, 500);
    });
}

var fakeSteps = [
    { p: 10, t: 100, m: 'Инициализация...' },
    { p: 30, t: 300, m: 'Загрузка конфигурации...' },
    { p: 50, t: 300, m: 'Подготовка интерфейса...' },
    { p: 70, t: 200, m: 'Почти готово...' },
    { p: 100, t: 200, m: 'Запуск...' },
];
var fi = 0;
function pollFake() {
    if (fi >= fakeSteps.length) { go(); return; }
    var s = fakeSteps[fi++];
    document.getElementById('status').textContent = s.m;
    document.getElementById('barFill').style.width = s.p + '%';
    setTimeout(pollFake, s.t);
}

setTimeout(pollUpdate, 200);
</script>
</body>
</html>
