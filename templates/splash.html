<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Token Maker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --bg-base: #0f0f0f;
    --bg-panel: #181818;
    --bg-hover: #282828;
    --border: #282828;
    --accent: #888888;
    --accent-hover: #aaaaaa;
    --accent-dim: rgba(136,136,136,0.12);
    --text-primary: #e0e0e0;
    --text-muted: #606060;
}
html, body {
    height: 100%;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
}
.splash {
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 24px;
    max-width: 380px;
}
.logo svg { width: 48px; height: 48px; stroke: var(--accent); }
.spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status { font-size: 13px; color: var(--text-muted); }
.status .accent { color: var(--accent); }
.bar {
    width: 240px; height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
}
.bar-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
}
.btn {
    padding: 6px 14px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg-panel);
    color: var(--text-primary); cursor: pointer; font-size: 12px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s, background 0.15s;
}
.btn:hover { border-color: var(--accent); background: var(--accent-dim); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-hover); }
.actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>
<div class="splash" id="splash">
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/></svg>
    </div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Загрузка...</div>
    <div class="bar" id="bar"><div class="bar-fill" id="barFill"></div></div>
    <div class="actions" id="actions" style="display:none"></div>
</div>
<script>
var downloading = false;

function id(name) { return document.getElementById(name); }

function go() { window.location.href = '/'; }

function startDownload() {
    downloading = true;
    id('bar').style.display = '';
    id('barFill').style.width = '0%';
    id('actions').style.display = 'none';
    id('spinner').style.display = '';
    id('status').innerHTML = 'Скачивание обновления... <span class="accent">0%</span>';
    fetch('/start_update_download', { method: 'POST' }).catch(function(){});
    pollDownload();
}

function pollDownload() {
    fetch('/update_status').then(function(r) { return r.json(); }).then(function(d) {
        if (d.download_error) {
            id('spinner').style.display = 'none';
            id('status').innerHTML =
                '<span style="color:#ef4444">Ошибка: ' + d.download_error + '</span>';
            id('actions').style.display = 'flex';
            id('actions').innerHTML =
                '<button class="btn" onclick="go()">Закрыть</button>';
            return;
        }
        if (!d.download_done) {
            var p = d.download_progress || 0;
            id('status').innerHTML =
                'Скачивание обновления... <span class="accent">' + p + '%</span>';
            id('barFill').style.width = p + '%';
            setTimeout(pollDownload, 300);
            return;
        }
        id('spinner').style.display = 'none';
        id('status').innerHTML =
            'Обновление <span class="accent">' + (d.update_tag || '') + '</span> скачано!<br>Перезапустить приложение?';
        id('actions').style.display = 'flex';
        id('actions').innerHTML =
            '<button class="btn btn-primary" onclick="applyRestart()">Перезапустить</button>' +
            '<button class="btn" onclick="go()">Позже</button>';
    }).catch(function() {
        setTimeout(pollDownload, 500);
    });
}

function applyRestart() {
    id('status').innerHTML = 'Перезапуск...';
    id('actions').style.display = 'none';
    id('spinner').style.display = '';
    fetch('/apply_update', { method: 'POST' }).then(function() {
        fetch('/api/window/destroy', { method: 'POST' }).catch(function(){});
        setTimeout(function() { window.location.href = '/'; }, 2000);
    });
}

var fakeSteps = [
    { p: 10, t: 100, m: 'Инициализация...' },
    { p: 30, t: 300, m: 'Загрузка конфигурации...' },
    { p: 50, t: 300, m: 'Подготовка интерфейса...' },
    { p: 70, t: 200, m: 'Почти готово...' },
    { p: 100, t: 200, m: 'Запуск...' },
];
var fi = 0;
var EXTRA_RETRIES = 30;

function pollUpdate(retries) {
    if (retries === undefined) retries = EXTRA_RETRIES;

    fetch('/update_status').then(function(r) { return r.json(); }).then(function(d) {
        if (d.download_progress >= 0 && !d.download_done) {
            pollDownload();
            return;
        }
        if (d.update_available && d.update_url && !downloading) {
            id('spinner').style.display = 'none';
            id('status').innerHTML =
                'Доступна версия <b class="accent">' + (d.update_tag || '') + '</b> (текущая: ' + d.current_version + ')';
            id('actions').style.display = 'flex';
            id('actions').innerHTML =
                '<button class="btn btn-primary" onclick="startDownload()">Скачать</button>' +
                '<button class="btn" onclick="go()">Пропустить</button>';
            return;
        }
        if (fi < fakeSteps.length) {
            var s = fakeSteps[fi++];
            id('status').textContent = s.m;
            id('barFill').style.width = s.p + '%';
            setTimeout(function() { pollUpdate(retries); }, s.t);
            return;
        }
        if (!d.update_checked && retries > 0) {
            id('status').textContent = 'Проверка обновлений...';
            setTimeout(function() { pollUpdate(retries - 1); }, 500);
            return;
        }
        go();
    }).catch(function() {
        if (fi < fakeSteps.length) {
            var s = fakeSteps[fi++];
            id('status').textContent = s.m;
            id('barFill').style.width = s.p + '%';
            setTimeout(function() { pollUpdate(retries); }, s.t);
        } else if (retries > 0) {
            setTimeout(function() { pollUpdate(retries - 1); }, 500);
        } else {
            go();
        }
    });
}

setTimeout(function() { pollUpdate(); }, 200);
</script>
</body>
</html>
